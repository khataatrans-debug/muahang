<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>🏠 Dashboard | Hệ thống Vận tải</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800&display=swap" rel="stylesheet" media="print" onload="this.media='all'">
<style>
:root {
  --navy:   #0d2248;
  --blue:   #1a3a8f;
  --accent: #1d6ef5;
  --green:  #0d9f6e;
  --red:    #e03131;
  --amber:  #e67700;
  --purple: #7c3aed;
  --cyan:   #0891b2;
  --border: #e2e8f5;
  --muted:  #64748b;
  --bg:     #eef1f8;
  --white:  #ffffff;
  --text:   #0f172a;
  --alt:    #f7f9ff;
  --shadow: 0 1px 3px rgba(13,34,72,.08), 0 1px 2px rgba(13,34,72,.04);
  --shadow-lg: 0 8px 24px rgba(13,34,72,.10), 0 2px 6px rgba(13,34,72,.06);
  --r:      6px;
  --r-lg:   14px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Be Vietnam Pro','Segoe UI',Arial,sans-serif;background:var(--bg);color:var(--text);font-size:13px;min-height:100vh;overflow-x:hidden;}

/* ── NAV (đồng bộ với các trang module) ── */
.nav{background:var(--navy);display:flex;align-items:center;padding:0 18px;height:46px;gap:2px;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(13,34,72,.3);}
.nav a{color:rgba(255,255,255,.6);text-decoration:none;font-size:12.5px;font-weight:500;padding:5px 12px;border-radius:5px;transition:.15s;white-space:nowrap;}
.nav a:hover{background:rgba(255,255,255,.1);color:#fff;}
.nav a.active{background:rgba(29,110,245,.5);color:#fff;font-weight:600;}
.nav-right{margin-left:auto;display:flex;align-items:center;gap:10px;}
.nav-user{color:rgba(255,255,255,.75);font-size:12px;font-weight:500;}
.btn-logout{background:rgba(255,255,255,.1);color:rgba(255,255,255,.8);border:1px solid rgba(255,255,255,.15);border-radius:5px;padding:4px 11px;font-size:12px;font-family:inherit;cursor:pointer;transition:.15s;}
.btn-logout:hover{background:rgba(255,255,255,.2);color:#fff;}

/* ── HERO HEADER ── */
.hero{background:linear-gradient(120deg,var(--navy) 0%,var(--blue) 100%);padding:26px 28px 34px;color:#fff;position:relative;overflow:hidden;}
.hero::after{content:'';position:absolute;right:-60px;top:-60px;width:260px;height:260px;border-radius:50%;background:radial-gradient(circle,rgba(29,110,245,.35) 0%,rgba(29,110,245,0) 70%);}
.hero-top{display:flex;align-items:flex-end;justify-content:space-between;flex-wrap:wrap;gap:14px;position:relative;z-index:1;}
.hero-greet{font-size:11px;font-weight:600;color:rgba(255,255,255,.6);text-transform:uppercase;letter-spacing:.1em;margin-bottom:4px;}
.hero-title{font-size:22px;font-weight:800;letter-spacing:-.01em;}
.hero-date{font-size:12px;color:rgba(255,255,255,.65);font-weight:500;margin-top:4px;}
.hero-clock{font-size:12px;color:rgba(255,255,255,.85);background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.15);padding:6px 14px;border-radius:20px;font-weight:600;}

/* ── CONTAINER ── */
.wrap{max-width:1280px;margin:0 auto;padding:0 24px;}

/* ── KPI STRIP ── */
.kpi-strip{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px;margin-top:-22px;position:relative;z-index:2;}
.kpi-card{background:var(--white);border-radius:var(--r-lg);border:1px solid var(--border);box-shadow:var(--shadow-lg);padding:16px 18px;display:flex;flex-direction:column;gap:6px;}
.kpi-top{display:flex;align-items:center;justify-content:space-between;}
.kpi-label{font-size:10.5px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;}
.kpi-icon{width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:15px;}
.kpi-val{font-size:24px;font-weight:800;color:var(--navy);letter-spacing:-.02em;}
.kpi-sub{font-size:11px;color:var(--muted);font-weight:500;}
.kpi-sub.up{color:var(--green);}
.kpi-sub.down{color:var(--red);}

/* ── SECTION ── */
.section{margin:30px 0 14px;}
.section-head{display:flex;align-items:center;gap:8px;margin-bottom:14px;}
.section-title{font-size:14px;font-weight:700;color:var(--navy);display:flex;align-items:center;gap:8px;}
.section-title::before{content:'';width:3px;height:15px;background:var(--accent);border-radius:2px;display:inline-block;}
.section-sub{font-size:11.5px;color:var(--muted);margin-left:11px;}

/* ── MODULE GRID ── */
.mod-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:14px;padding-bottom:8px;}
.mod-card{background:var(--white);border-radius:var(--r-lg);border:1px solid var(--border);box-shadow:var(--shadow);padding:18px;text-decoration:none;color:var(--text);display:flex;flex-direction:column;gap:10px;transition:.18s;position:relative;overflow:hidden;}
.mod-card:hover{transform:translateY(-3px);box-shadow:var(--shadow-lg);border-color:#c7d4f0;}
.mod-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--card-color,var(--accent));}
.mod-icon{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:19px;background:var(--card-bg,#eff6ff);}
.mod-name{font-size:13.5px;font-weight:700;color:var(--navy);}
.mod-desc{font-size:11.5px;color:var(--muted);line-height:1.5;}
.mod-lock{position:absolute;top:14px;right:14px;font-size:11px;color:var(--muted);background:#f1f5f9;border-radius:20px;padding:2px 9px;font-weight:600;}

/* ── EMPTY STATE ── */
.empty{background:var(--white);border:1px dashed var(--border);border-radius:var(--r-lg);padding:36px 20px;text-align:center;color:var(--muted);font-size:12.5px;}

footer{text-align:center;color:var(--muted);font-size:11px;padding:26px 0 30px;}
</style>
</head>
<body>

<!-- ✅ GUARD + NAV ĐỘNG — đồng bộ cấu trúc với các trang module khác -->
<script>
(function() {
  const CURRENT_KEY = "LOGIN_USER";
  const THIS_PAGE   = "index.html";

  /* 1. Guard */
  const raw = localStorage.getItem(CURRENT_KEY);
  const app2 = new URLSearchParams(location.search).get("app") || "";
  const sep2 = app2 ? "?app=" + app2 : "";
  if (!raw) { location.href = "login.html" + sep2; return; }
  const session = JSON.parse(raw);
  // Dashboard là trang chung: mọi role đăng nhập hợp lệ đều xem được (không cần khai trong pages[])

  /* 2. Định nghĩa toàn bộ module trong hệ thống */
  const ALL_NAV = [
    { page: "index.html",         label: "🏠 Dashboard" },
    { page: "transportation.html",label: "🚚 Kế hoạch VC" },
    { page: "accountant.html",    label: "📒 Kế toán" },
    { page: "performance.html",   label: "📈 Hiệu suất" },
    { page: "overview.html",      label: "📊 Tổng quan" },
    { page: "maintenance.html",   label: "🔧 Bảo dưỡng",  adminOnly: true },
    { page: "fuel.html",          label: "⛽ Nhiên liệu",  adminOnly: true },
    { page: "master.html",        label: "📂 Dữ liệu gốc", adminOnly: true },
    { page: "depot.html",         label: "🏗 Depot" },
    { page: "ware.html",          label: "📦 Kho Ware" },
    { page: "purchasing.html",    label: "🛒 Mua hàng" },
    { page: "users.html",         label: "👑 Phân quyền",  adminOnly: true },
  ];

  // Thẻ module hiển thị trên dashboard (mô tả + màu + icon riêng cho từng khối)
  const MODULE_CARDS = [
    { page:"transportation.html", label:"Kế hoạch vận tải", desc:"Lên kế hoạch chuyến, container, booking & cut-off", icon:"🚚", color:"#1d6ef5", bg:"#eff6ff" },
    { page:"depot.html",          label:"Depot",            desc:"Theo dõi container ra/vào tại các depot",             icon:"🏗", color:"#0891b2", bg:"#ecfeff" },
    { page:"ware.html",           label:"Kho Ware",         desc:"Quản lý tồn kho, xuất nhập hàng hoá",                 icon:"📦", color:"#0d9f6e", bg:"#ecfdf5" },
    { page:"purchasing.html",     label:"Mua hàng",         desc:"Quản lý đơn mua, nhà cung cấp",                       icon:"🛒", color:"#e67700", bg:"#fff7ed" },
    { page:"accountant.html",     label:"Kế toán",          desc:"Đối soát công nợ, chi phí vận tải",                   icon:"📒", color:"#7c3aed", bg:"#f5f3ff" },
    { page:"performance.html",    label:"Hiệu suất",        desc:"Theo dõi KPI đội xe & tài xế",                        icon:"📈", color:"#e03131", bg:"#fef2f2" },
    { page:"overview.html",       label:"Tổng quan",        desc:"Báo cáo tổng hợp toàn hệ thống",                      icon:"📊", color:"#1a3a8f", bg:"#eef1f8" },
    { page:"fuel.html",           label:"Nhiên liệu",       desc:"Theo dõi định mức & chi phí nhiên liệu",  icon:"⛽", color:"#0d9f6e", bg:"#ecfdf5", adminOnly:true },
    { page:"maintenance.html",    label:"Bảo dưỡng",        desc:"Lịch bảo trì, sửa chữa phương tiện",      icon:"🔧", color:"#e67700", bg:"#fff7ed", adminOnly:true },
    { page:"master.html",         label:"Dữ liệu gốc",      desc:"Khách hàng, xe, hãng tàu, địa điểm",      icon:"📂", color:"#64748b", bg:"#f8fafc", adminOnly:true },
    { page:"users.html",          label:"Phân quyền",       desc:"Quản lý tài khoản & quyền truy cập",      icon:"👑", color:"#e03131", bg:"#fef2f2", adminOnly:true },
  ];

  document.addEventListener("DOMContentLoaded", function() {
    const nav      = document.getElementById("mainNav");
    const navRight = nav.querySelector(".nav-right");
    const curPage  = "index.html";

    function canSee(item) {
      if (session.role === "admin" || session.role === "viceadmin") return true;
      if (item.adminOnly) return false;
      return (session.pages || []).includes(item.page);
    }

    /* Build nav trên cùng */
    ALL_NAV.forEach(item => {
      if (!canSee(item)) return;
      const a = document.createElement("a");
      a.href = item.page;
      a.textContent = item.label;
      if (curPage === item.page) a.classList.add("active");
      nav.insertBefore(a, navRight);
    });

    /* Build lưới module trên dashboard */
    const grid = document.getElementById("modGrid");
    let visibleCount = 0;
    MODULE_CARDS.forEach(m => {
      if (!canSee(m)) return;
      visibleCount++;
      const a = document.createElement("a");
      a.className = "mod-card";
      a.href = m.page;
      a.style.setProperty("--card-color", m.color);
      a.style.setProperty("--card-bg", m.bg);
      a.innerHTML = `
        <div class="mod-icon" style="color:${m.color}">${m.icon}</div>
        <div class="mod-name">${m.label}</div>
        <div class="mod-desc">${m.desc}</div>`;
      grid.appendChild(a);
    });
    if (!visibleCount) {
      grid.innerHTML = `<div class="empty">Tài khoản của bạn chưa được cấp quyền truy cập module nào. Liên hệ quản trị viên để được phân quyền.</div>`;
    }

    /* Tên user + logout */
    document.getElementById("userInfo").textContent = `👤 ${session.username} (${session.role})`;
    document.getElementById("btnLogout").onclick = function() {
      localStorage.removeItem(CURRENT_KEY);
      location.href = "login.html" + (location.search || "");
    };

    /* Ngày giờ hiện tại */
    function renderClock() {
      const now = new Date();
      const days = ["Chủ nhật","Thứ hai","Thứ ba","Thứ tư","Thứ năm","Thứ sáu","Thứ bảy"];
      document.getElementById("heroDate").textContent =
        `${days[now.getDay()]}, ${now.toLocaleDateString('vi-VN')}`;
      document.getElementById("heroClock").textContent =
        now.toLocaleTimeString('vi-VN', {hour:'2-digit',minute:'2-digit'});
    }
    renderClock();
    setInterval(renderClock, 30000);

    /* Chào theo giờ */
    const h = new Date().getHours();
    const greet = h < 11 ? "Chào buổi sáng" : h < 14 ? "Chào buổi trưa" : h < 18 ? "Chào buổi chiều" : "Chào buổi tối";
    document.getElementById("heroGreet").textContent = greet;
  });
})();
</script>

<!-- NAV -->
<nav class="nav" id="mainNav">
  <div class="nav-right">
    <span class="nav-user" id="userInfo"></span>
    <button class="btn-logout" id="btnLogout">↩ Đăng xuất</button>
  </div>
</nav>

<!-- HERO -->
<div class="hero">
  <div class="wrap hero-top">
    <div>
      <div class="hero-greet" id="heroGreet">Xin chào</div>
      <div class="hero-title">Tổng quan hệ thống</div>
      <div class="hero-date" id="heroDate"></div>
    </div>
    <div class="hero-clock" id="heroClock">--:--</div>
  </div>
</div>

<div class="wrap">

  <!-- KPI nhanh (tĩnh — có thể nối API/Firestore sau) -->
  <div class="kpi-strip">
    <div class="kpi-card">
      <div class="kpi-top">
        <span class="kpi-label">Chuyến hôm nay</span>
        <span class="kpi-icon" style="background:#eff6ff;color:#1d6ef5">🚚</span>
      </div>
      <div class="kpi-val">—</div>
      <div class="kpi-sub">Xem chi tiết tại Kế hoạch VC</div>
    </div>
    <div class="kpi-card">
      <div class="kpi-top">
        <span class="kpi-label">Container tại Depot</span>
        <span class="kpi-icon" style="background:#ecfeff;color:#0891b2">🏗</span>
      </div>
      <div class="kpi-val">—</div>
      <div class="kpi-sub">Cập nhật realtime tại Depot</div>
    </div>
    <div class="kpi-card">
      <div class="kpi-top">
        <span class="kpi-label">Đơn mua chờ duyệt</span>
        <span class="kpi-icon" style="background:#fff7ed;color:#e67700">🛒</span>
      </div>
      <div class="kpi-val">—</div>
      <div class="kpi-sub">Xem tại Mua hàng</div>
    </div>
    <div class="kpi-card">
      <div class="kpi-top">
        <span class="kpi-label">Cảnh báo bảo dưỡng</span>
        <span class="kpi-icon" style="background:#fef2f2;color:#e03131">🔧</span>
      </div>
      <div class="kpi-val">—</div>
      <div class="kpi-sub">Xem tại Bảo dưỡng</div>
    </div>
  </div>

  <!-- MODULE GRID -->
  <div class="section">
    <div class="section-head">
      <span class="section-title">Module hệ thống</span>
      <span class="section-sub">Chọn khu vực bạn muốn làm việc</span>
    </div>
    <div class="mod-grid" id="modGrid"></div>
  </div>

  <footer>Hệ thống quản lý vận tải · Dashboard</footer>
</div>

</body>
</html>
